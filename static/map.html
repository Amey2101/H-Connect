<!DOCTYPE html>
<html>

<head>
<title>Ambulance Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
    height: 100vh;
    width: 100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

console.log("JS loaded")

const map = L.map('map').setView([16.9944,73.3000],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map)


// --------------------
// ICONS
// --------------------

const govtAmbulanceIcon = L.icon({
    iconUrl:'/static/ambulance_green.png',
    iconSize:[32,32]
})

const privateAmbulanceIcon = L.icon({
    iconUrl:'/static/ambulance_blue.png',
    iconSize:[32,32]
})


// --------------------
// STORAGE
// --------------------

const ambulanceMarkers = {}
const hospitalMarkers = {}
const routeLines = {}
const lastPositions = {}


// --------------------
// ANTI-JITTER
// --------------------

function hasMovedEnough(id, lat, lon){

    if(!lastPositions[id]){
        lastPositions[id] = [lat, lon]
        return true
    }

    const [oldLat, oldLon] = lastPositions[id]
    const dist = map.distance([lat, lon], [oldLat, oldLon])

    if(dist > 15){
        lastPositions[id] = [lat, lon]
        return true
    }

    return false
}


// --------------------
// LOAD AMBULANCES
// --------------------

async function updateAmbulances(){

    const res = await fetch("/ambulances")
    const data = await res.json()

    data.forEach(a=>{

        const icon = a.type === "government"
            ? govtAmbulanceIcon
            : privateAmbulanceIcon

        if(!ambulanceMarkers[a.ambulance_id]){

            const marker = L.marker([a.latitude,a.longitude],{icon:icon}).addTo(map)

            marker.bindPopup(
                `🚑 ${a.ambulance_id}<br>
                 Type: ${a.type}<br>
                 ETA: N/A`
            )

            ambulanceMarkers[a.ambulance_id] = marker
        }

    })

    if(data.length > 0){
        loadNearbyHospitals(data[0].latitude, data[0].longitude)
    }
}


// --------------------
// LOAD HOSPITALS
// --------------------

async function loadNearbyHospitals(lat, lon){

    const res = await fetch(`/hospitals/nearby?latitude=${lat}&longitude=${lon}`)
    const hospitals = await res.json()

    hospitals.forEach(h=>{

        if(!hospitalMarkers[h.hospital_id]){

            const marker = L.marker([h.latitude,h.longitude]).addTo(map)

            marker.bindPopup(
                `🏥 ${h.name}<br>
                 Distance: ${h.distance_km} km`
            )

            hospitalMarkers[h.hospital_id] = marker

        }

    })
}


// --------------------
// DRAW ROUTE
// --------------------

async function drawRoute(key, ambLat, ambLon, hospitalLat, hospitalLon){

    if(hospitalLat == null || hospitalLon == null)
        return;

    const url =
`https://router.project-osrm.org/route/v1/driving/${ambLon},${ambLat};${hospitalLon},${hospitalLat}?overview=full&geometries=geojson`;

    const response = await fetch(url);

    const data = await response.json();

    if(data.routes.length === 0)
        return;

    const coordinates =
        data.routes[0].geometry.coordinates.map(c => [
            c[1],
            c[0]
        ]);

    if(routeLines[key]){

        routeLines[key].setLatLngs(coordinates);

    }
    else{

        routeLines[key] = L.polyline(coordinates,{
            color:"#0066ff",
            weight:6
        }).addTo(map);

    }

}


// --------------------
// WEBSOCKET
// --------------------

const ws = new WebSocket(`ws://${window.location.hostname}:8000/ws`)

ws.onopen = () => console.log("✅ WebSocket Connected")
ws.onerror = (err) => console.log("❌ WebSocket Error:", err)
ws.onclose = () => console.log("⚠️ WebSocket Closed")

ws.onmessage = async function(event){

    const data = JSON.parse(event.data)
    console.log("WS DATA :", data)

    if(data.type === "ambulance_update"){

        const id = data.ambulance_id

        // --------------------
        // UPDATE POSITION (ANTI-JITTER)
        // --------------------
        if(ambulanceMarkers[id] && hasMovedEnough(id, data.latitude, data.longitude)){
            ambulanceMarkers[id].setLatLng([data.latitude, data.longitude])
        }

        // --------------------
        // UPDATE POPUP
        // --------------------
        if(ambulanceMarkers[id]){
            ambulanceMarkers[id].bindPopup(
                `🚑 ${id}<br>
                 ETA: ${data.eta ? data.eta + " mins" : "N/A"}`
            )
        }

        // --------------------
        // KEEP HOSPITALS LOADED
        // --------------------
        await loadNearbyHospitals(data.latitude, data.longitude)

        // --------------------
        // 🚨 FIXED ROUTE LOGIC
        // --------------------
        if(data.has_active_ticket && data.hospital_lat != null && data.hospital_lon != null){

            const routeKey = id + "_" + data.hospital_id

            drawRoute(
                routeKey,
                data.latitude,
                data.longitude,
                data.hospital_lat,
                data.hospital_lon
            )
        }
    }
}


// --------------------
// INIT
// --------------------

updateAmbulances()

</script>

</body>

</html>
