<!DOCTYPE html>
<html>

<head>
<title>Ambulance Tracking</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
    height: 100vh;
    width: 100%;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

console.log("JS loaded")

const map = L.map('map').setView([16.9944,73.3000],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
}).addTo(map)


// --------------------
// ICONS
// --------------------

const govtAmbulanceIcon = L.icon({
    iconUrl:'/static/ambulance_green.png',
    iconSize:[32,32]
})

const privateAmbulanceIcon = L.icon({
    iconUrl:'/static/ambulance_blue.png',
    iconSize:[32,32]
})


// --------------------
// STORAGE
// --------------------

const ambulanceMarkers = {}
const hospitalMarkers = {}
const routeLines = {}
const lastPositions = {}


// --------------------
// MOVEMENT FILTER (ANTI-JITTER)
// --------------------

function hasMovedEnough(id, lat, lon){

    if(!lastPositions[id]){
        lastPositions[id] = [lat, lon]
        return true
    }

    const [oldLat, oldLon] = lastPositions[id]

    const dist = map.distance([lat, lon], [oldLat, oldLon])

    if(dist > 20){
        lastPositions[id] = [lat, lon]
        return true
    }

    return false
}


// --------------------
// LOAD AMBULANCES
// --------------------

async function updateAmbulances(){

    const res = await fetch("/ambulances")
    const data = await res.json()

    console.log("Initial ambulances:", data)

    data.forEach(a=>{

        const icon = a.type === "government"
            ? govtAmbulanceIcon
            : privateAmbulanceIcon

        if(!ambulanceMarkers[a.ambulance_id]){

            const marker = L.marker([a.latitude,a.longitude],{icon:icon}).addTo(map)

            marker.bindPopup(
                `🚑 ${a.ambulance_id}<br>
                 Type: ${a.type}<br>
                 ETA: N/A`
            )

            ambulanceMarkers[a.ambulance_id] = marker
        }

    })

    if(data.length > 0){
        loadNearbyHospitals(data[0].latitude, data[0].longitude)
    }
}


// --------------------
// LOAD HOSPITALS
// --------------------

async function loadNearbyHospitals(lat, lon){

    const res = await fetch(`/hospitals/nearby?latitude=${lat}&longitude=${lon}`)
    const hospitals = await res.json()

    hospitals.forEach(h=>{

        if(!hospitalMarkers[h.hospital_id]){

            const marker = L.marker([h.latitude,h.longitude]).addTo(map)

            marker.bindPopup(
                `🏥 ${h.name}<br>
                 Distance: ${h.distance_km} km`
            )

            hospitalMarkers[h.hospital_id] = marker
        }

    })
}


// --------------------
// DRAW / UPDATE ROUTE
// --------------------

function drawRoute(ambulanceId, ambLat, ambLon, hospitalLat, hospitalLon){

    if(!hospitalLat || !hospitalLon) return

    // UPDATE existing line
    if(routeLines[ambulanceId]){
        routeLines[ambulanceId].setLatLngs([
            [ambLat, ambLon],
            [hospitalLat, hospitalLon]
        ])
        return
    }

    // CREATE new line
    const line = L.polyline([
        [ambLat, ambLon],
        [hospitalLat, hospitalLon]
    ], {
        color:'red',
        weight:5
    }).addTo(map)

    routeLines[ambulanceId] = line
}


// --------------------
// WEBSOCKET
// --------------------

const ws = new WebSocket(`ws://${window.location.hostname}:8000/ws`)

ws.onopen = () => {
    console.log("✅ WebSocket Connected")
}

ws.onerror = (err) => {
    console.log("❌ WebSocket Error:", err)
}

ws.onclose = () => {
    console.log("⚠️ WebSocket Closed")
}


ws.onmessage = async function(event){

    const data = JSON.parse(event.data)
    console.log("WS DATA :", data)

    if(data.type === "ambulance_update"){

        const id = data.ambulance_id

        // --------------------
        // UPDATE MARKER
        // --------------------
        if(ambulanceMarkers[id]){
            ambulanceMarkers[id].setLatLng([data.latitude, data.longitude])
        }

        // --------------------
        // UPDATE POPUP
        // --------------------
        if(ambulanceMarkers[id]){
            ambulanceMarkers[id].bindPopup(
                `🚑 ${id}<br>
                 ETA: ${data.eta ? data.eta + " mins" : "N/A"}`
            )
        }

        // --------------------
        // KEEP HOSPITALS LOADED
        // --------------------
        await loadNearbyHospitals(data.latitude, data.longitude)

        // --------------------
        // DRAW ROUTE (ONLY IF ACTIVE)
        // --------------------
        if(
            data.has_active_ticket &&
            data.hospital_id &&
            hasMovedEnough(id, data.latitude, data.longitude)
        ){
            drawRoute(
                id,
                data.latitude,
                data.longitude,
                data.hospital_lat,
                data.hospital_lon
            )
        }
    }
}


// --------------------
// INIT
// --------------------

updateAmbulances()

</script>

</body>
</html>
